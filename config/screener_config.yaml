# Screener & Peer Comparison Engine config
# Analyst-editable thresholds. Set a value to null to disable that filter.

filters:
  roe_min: 15.0              # ROE min %
  de_max: 1.0                # Debt/Equity max (skipped for Financials sector)
  fcf_min: 0.0                # FCF min (positive FCF)
  revenue_cagr_5yr_min: null  # Revenue CAGR 5yr min %
  pat_cagr_5yr_min: null      # PAT CAGR 5yr min %
  opm_min: null               # Operating margin min %
  pe_max: null                # P/E max
  pb_max: null                # P/B max
  dividend_yield_min: null    # Dividend yield min %
  icr_min: 3.0                 # Interest Coverage Ratio min (debt-free = infinity, always passes)
  market_cap_min: null         # Market cap min (Cr)

sectors:
  financials_label: "Financials"   # sector value in DB that exempts D/E filter

composite_score:
  weights:
    profitability: 0.35   # ROE 15% + ROCE 10% + NPM 10%
    cash_quality: 0.30    # FCF CAGR 15% + CFO/PAT ratio 10% + FCF margin 5%
    growth: 0.20          # Revenue CAGR 10% + PAT CAGR 10%
    leverage: 0.15        # D/E (inverse) 10% + ICR score 5%
  winsorize_pct: [0.10, 0.90]   # cap each metric at 10th and 90th percentile before scaling
  scale_range: [0, 100]

peer_percentiles:
  metrics:
    - return_on_equity_pct
    - return_on_capital_pct
    - net_profit_margin_pct
    - debt_to_equity
    - pat_cagr_5yr
    - revenue_cagr_5yr
    - eps_cagr_5yr
    - interest_coverage
    - asset_turnover
  min_peer_group_size: 3  # below this, return "No peer group assigned"

presets:
  quality_compounder:
    roe_min: 15.0
    de_max: 1.0
    fcf_min: 0.0
    revenue_cagr_5yr_min: 10.0
  value_pick:
    pe_max: 20.0
    pb_max: 3.0
    dividend_yield_min: 2.0
  growth_accelerator:
    revenue_cagr_5yr_min: 20.0
    pat_cagr_5yr_min: 15.0
    de_max: 2.0
  dividend_champion:
    dividend_yield_min: 3.0
    dividend_payout_min: 40.0
    dividend_payout_max: 80.0
    fcf_min: 0.0
  debt_free_blue_chip:
    de_max: 0.0
    roe_min: 12.0
    revenue_min_cr: 5000.0
  turnaround_watch:
    revenue_cagr_5yr_min: 10.0
    fcf_declining_yoy: true   # flag: FCF declining year-over-year, positive if screener finds it
